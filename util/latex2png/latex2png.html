<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equation Renderer</title>
 
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            
            
        }
        #equationInput {
            
            height: 100px;
            margin-bottom: 10px;
            font-size: 16px;
        }
      
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <textarea id="equationInput" placeholder="Enter equations in LaTeX format, one per line...\nExample:\n2x + 3 = 7\nx^2 + 2x + 1 = 0\n\\frac{1}{2} + \\frac{3}{4} = \\frac{5}{4}"></textarea>
    <button onclick="renderEquations()">Render Equations</button>
    <button onclick="saveAsPNG()">Save as PNG</button>
    <div id="renderArea"></div>

   <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script type='text/javascript'>
        function renderEquations() {
            const input = document.getElementById('equationInput').value;
            const equations = input.split('\n').filter(eq => eq.trim() !== '');
            const renderArea = document.getElementById('renderArea');
            renderArea.innerHTML = equations.map(eq => `\\[${eq}\\]`).join('<br>');
            MathJax.Hub.Queue(["Typeset", MathJax.Hub, renderArea]);
        }

        function saveAsPNG() {
            const renderArea = document.getElementById('renderArea');
            html2canvas(renderArea,{scale:1}).then(canvas => {
                const link = document.createElement('a');
                link.download = 'equations.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Initial equations
        document.getElementById('equationInput').value = 
            '2x + 3 = 7\nx^2 + 2x + 1 = 0\n\\frac{1}{2} + \\frac{3}{4} = \\frac{5}{4}';
        renderEquations();
    </script>
</body>
</html>
